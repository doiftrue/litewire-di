name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '7.4'
          - '8.0'
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist --no-progress

      - name: ___ Run PHPUnit ___
        run: composer phpunit -- --colors=always

  static-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist --no-progress

      - name: ___ Run PHPStan ___
        run: composer phpstan -- --no-progress --memory-limit=1G

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: pcov
          tools: composer:v2

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist --no-progress

      - name: ___ Report ___
        shell: bash
        run: |
          set -o pipefail
          composer coverage -- --colors=never | tee coverage.txt

          {
            echo '## Code coverage'
            echo
            echo '```text'
            cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
